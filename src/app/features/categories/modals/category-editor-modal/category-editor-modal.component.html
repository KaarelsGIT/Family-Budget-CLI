<div class="modal-overlay" *ngIf="isOpen()">
  <div class="modal-backdrop" (click)="close()"></div>

  <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="category-editor-title" [style.transform]="getModalTransform()" (keydown.escape)="close()">
    <div class="modal-header" (pointerdown)="startDrag($event)">
      <h2 id="category-editor-title">
        {{ isEditMode() ? i18n.translate('categories.editTitle') : i18n.translate('categories.createTitle') }}
      </h2>
      <button type="button" class="close-button" (pointerdown)="$event.stopPropagation()" (click)="close()" [attr.aria-label]="i18n.translate('login.cancel')">✖</button>
    </div>

    <form [formGroup]="form" class="modal-form" (ngSubmit)="submit()" (keydown.enter)="$event.preventDefault(); submit()">
      <p class="helper-copy" *ngIf="isCreateSubMode() && parentCategory() as parent">
        {{ i18n.translate('categories.parentCategory') }}: <strong>{{ parent.name }}</strong>
      </p>

      <label class="field">
        <span>{{ i18n.translate('categories.name') }}</span>
        <input class="form-input-rounded" type="text" formControlName="name" />
      </label>

      <label class="field" *ngIf="isCreateMainMode() || isCreateSubMode() || isEditMode()">
        <span>{{ i18n.translate('categories.type') }}</span>
        <select class="form-input-rounded" formControlName="type">
          <option value="EXPENSE">{{ i18n.translate('transactions.typeExpense') }}</option>
          <option value="INCOME">{{ i18n.translate('transactions.typeIncome') }}</option>
        </select>
      </label>

      <label class="field" *ngIf="isCreateMainMode() || isCreateSubMode() || isEditMode()">
        <span>{{ i18n.translate('categories.group') }}</span>
        <select class="form-input-rounded" formControlName="group">
          <option *ngFor="let group of getAllowedGroupOptions()" [value]="group">
            {{ group === 'FAMILY'
              ? i18n.translate('categories.groupFamily')
              : group === 'CHILD'
                ? i18n.translate('categories.groupChild')
                : i18n.translate('categories.groupParent') }}
          </option>
        </select>
      </label>

      <p class="success-message" *ngIf="successMessage()">{{ successMessage() }}</p>
      <p class="error-message" *ngIf="errorMessage()">{{ errorMessage() }}</p>

      <div class="modal-actions">
        <button type="button" class="secondary" (click)="close()">{{ i18n.translate('login.cancel') }}</button>
        <button type="submit" class="primary" [disabled]="isSubmitting()">
          {{ isSubmitting()
            ? (isEditMode() ? i18n.translate('categories.saving') : i18n.translate('categories.creating'))
            : (isEditMode() ? i18n.translate('categories.save') : i18n.translate('categories.create')) }}
        </button>
      </div>
    </form>
  </section>
</div>
