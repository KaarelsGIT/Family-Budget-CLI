<div class="edit-inline" *ngIf="!isEditing(); else editForm">
  <span class="account-title">{{ account().name }}</span>
  <button
    type="button"
    class="icon-button"
    *ngIf="editable() && showTrigger()"
    (click)="startEditing()"
    [attr.aria-label]="i18n.translate('accounts.editName')">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M3 17.25V21h3.75L17.8 9.94l-3.75-3.75L3 17.25Zm17.7-10.04a1 1 0 0 0 0-1.41l-2.5-2.5a1 1 0 0 0-1.41 0l-1.96 1.96 3.75 3.75 2.12-2.1Z" fill="currentColor"/>
    </svg>
  </button>
</div>

<ng-template #editForm>
  <form class="edit-form" [formGroup]="form" (ngSubmit)="save()">
    <input type="text" formControlName="name" />
    <button type="submit" class="icon-button confirm" [disabled]="isSaving()" [attr.aria-label]="i18n.translate('accounts.saveName')">
      ✔
    </button>
    <button type="button" class="icon-button cancel" (click)="cancel()" [attr.aria-label]="i18n.translate('accounts.cancelEdit')">
      ✖
    </button>
  </form>

  <p class="error-message" *ngIf="errorMessage()">{{ errorMessage() }}</p>
</ng-template>
