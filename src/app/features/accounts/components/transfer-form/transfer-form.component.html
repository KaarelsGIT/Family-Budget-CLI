<form [formGroup]="form" class="transfer-form" (ngSubmit)="submit()">
  <p class="helper-copy">
    {{ i18n.translate('accounts.transferAccountHint') }}
  </p>

  <div class="target-section">
    <div class="section-header">
      <span>{{ i18n.translate('accounts.shareSelectUser') }}</span>
    </div>

    <div class="account-list" *ngIf="hasTransferTargets(); else noAccounts">
      <ng-container *ngFor="let user of transferTargetUsers(); trackBy: trackByTransferTargetUser">
        <ng-container *ngIf="!user.isCurrentUser; else currentUserTarget">
          <label class="account-option">
            <input type="radio" formControlName="toAccountId" [value]="user.id" (change)="selectTransferTarget(user.id)" />
            <span class="account-label">
              <span class="account-name">{{ user.username }}</span>
            </span>
          </label>
        </ng-container>
        <ng-template #currentUserTarget>
          <div *ngIf="shouldShowMyAccountsSection(user); else hiddenCurrentUserTarget" class="user-group current-user-group">
            <button type="button" class="group-toggle" (click)="toggleTargetExpansion(user)">
              <span>{{ i18n.translate('accounts.myAccounts') }}</span>
              <span class="group-state">{{ isExpandedTarget(user) ? '▾' : '▸' }}</span>
            </button>

            <div class="group-accounts" *ngIf="isExpandedTarget(user)">
              <label class="account-option" *ngFor="let account of user.accounts; trackBy: trackByAccountId">
                <input type="radio" formControlName="toAccountId" [value]="account.id" (change)="selectTransferTarget(account.id)" />
                <span class="account-label">
                  <span class="account-name">{{ account.name }}</span>
                  <span class="account-meta">{{ getAccountDetails(account) }}</span>
                </span>
              </label>
            </div>
          </div>
        </ng-template>
        <ng-template #hiddenCurrentUserTarget></ng-template>
      </ng-container>
    </div>

    <ng-template #noAccounts>
      <p class="empty-message">{{ i18n.translate('accounts.noTransferTargets') }}</p>
    </ng-template>
  </div>

  <label class="field">
    <span>{{ i18n.translate('accounts.transferAmount') }}</span>
    <input type="number" min="0.01" step="0.01" formControlName="amount" />
  </label>

  <p class="error-message" *ngIf="!isAmountWithinBalance() && form.controls.amount.value">
    {{ i18n.translate('transactions.balanceWouldGoNegative') }}
  </p>

  <label class="field">
    <span>{{ i18n.translate('transactions.columnDate') }}</span>
    <input type="date" formControlName="transactionDate" />
  </label>

  <label class="field">
    <span>{{ i18n.translate('accounts.transferComment') }}</span>
    <textarea rows="3" formControlName="comment"></textarea>
  </label>

  <p class="error-message" *ngIf="!hasTransferTargets()">{{ i18n.translate('accounts.noTransferTargets') }}</p>
  <p class="error-message" *ngIf="errorMessage()">{{ errorMessage() }}</p>

  <div class="modal-actions">
    <button type="submit" class="primary" [disabled]="isSubmitting() || !hasTransferTargets() || !isAmountWithinBalance()">
      {{ isSubmitting() ? i18n.translate('accounts.processing') : i18n.translate('accounts.transferCreate') }}
    </button>
  </div>
</form>
