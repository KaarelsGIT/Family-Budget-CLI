<div class="modal-overlay">
  <div class="modal-backdrop" (click)="close()"></div>

  <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="transfer-title">
    <div class="modal-header">
      <h2 id="transfer-title">{{ i18n.translate('accounts.transferTitle') }}</h2>
      <button type="button" class="close-button" (click)="close()" [attr.aria-label]="i18n.translate('login.cancel')">✖</button>
    </div>

    <app-transfer-form
      [sourceAccount]="sourceAccount()"
      [accounts]="accounts()"
      (transferred)="onTransferred($event)"
      (error)="onError($event)" />
  </section>
</div>
