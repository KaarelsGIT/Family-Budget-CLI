<div class="modal-overlay">
  <div class="modal-backdrop" (click)="close()"></div>

  <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="adjust-balance-title">
    <div class="modal-header">
      <h2 id="adjust-balance-title">{{ i18n.translate('accounts.adjustBalanceTitle') }}</h2>
      <button type="button" class="close-button" (click)="close()" [attr.aria-label]="i18n.translate('login.cancel')">✖</button>
    </div>

    <form [formGroup]="form" class="modal-form" (ngSubmit)="submit()">
      <label class="field">
        <span>{{ i18n.translate('accounts.adjustBalanceCurrent') }}</span>
        <div class="readonly-field">{{ formatBalance(account().balance) }}</div>
      </label>

      <label class="field">
        <span>{{ i18n.translate('accounts.adjustBalanceAmount') }}</span>
        <input type="text" step="0.01" inputmode="decimal" formControlName="amount" (input)="normalizeMoneyInput($event)" />
      </label>

      <label class="field">
        <span>{{ i18n.translate('accounts.adjustBalanceComment') }}</span>
        <textarea rows="3" formControlName="comment"></textarea>
      </label>

      <p class="error-message" *ngIf="errorMessage()">{{ errorMessage() }}</p>

      <div class="modal-actions">
        <button type="button" class="secondary" (click)="close()">{{ i18n.translate('login.cancel') }}</button>
        <button type="submit" class="primary" [disabled]="isSubmitting()">
          {{ isSubmitting() ? i18n.translate('accounts.processing') : i18n.translate('accounts.adjustBalanceAction') }}
        </button>
      </div>
    </form>
  </section>
</div>
