<ng-container *ngIf="isOpen()">
  <div class="modal-overlay">
    <div class="modal-backdrop" (click)="close()"></div>

    <section
      class="modal-card help-guide-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="help-guide-title"
      [style.transform]="getModalTransform()"
      (pointermove)="onDrag($event)"
      (pointerup)="stopDrag($event)"
      (pointercancel)="stopDrag($event)">
      <div class="modal-header" (pointerdown)="startDrag($event)">
        <div class="header-copy">
          <p class="eyebrow">{{ content().eyebrow }}</p>
          <h2 id="help-guide-title">{{ content().title }}</h2>
        </div>

        <button
          type="button"
          class="close-button"
          (pointerdown)="$event.stopPropagation()"
          (click)="close()"
          [attr.aria-label]="content().closeLabel">x</button>
      </div>

      <div class="help-guide-shell">
        <p class="guide-subtitle">{{ content().subtitle }}</p>

        <div class="guide-layout">
          <aside class="guide-toc" aria-label="{{ content().tocTitle }}">
            <p class="guide-toc-title">{{ content().tocTitle }}</p>
            <button
              type="button"
              class="guide-toc-item"
              *ngFor="let section of content().sections"
              [class.is-active]="activeSectionId() === section.id"
              (click)="scrollToSection(section.id)">
              {{ section.title }}
            </button>
          </aside>

          <div class="guide-content">
            <section
              class="guide-section"
              *ngFor="let section of content().sections"
              [id]="section.id"
              [class.is-active]="activeSectionId() === section.id"
              [hidden]="activeSectionId() !== section.id">
              <h3>{{ section.title }}</h3>
              <p class="guide-intro">{{ section.intro }}</p>
              <ul class="guide-points">
                <li *ngFor="let point of section.points">{{ point }}</li>
              </ul>
            </section>

          </div>
        </div>
      </div>
    </section>
  </div>
</ng-container>
