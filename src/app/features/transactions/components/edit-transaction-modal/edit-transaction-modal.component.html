<div class="modal-overlay">
  <div class="modal-backdrop" (click)="close()"></div>

  <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="edit-transaction-title" [style.transform]="getModalTransform()">
    <div class="modal-header" (pointerdown)="startDrag($event)">
      <h2 id="edit-transaction-title">{{ i18n.translate('transactions.editTitle') }}</h2>
      <button type="button" class="close-button" (pointerdown)="$event.stopPropagation()" (click)="close()" [attr.aria-label]="i18n.translate('login.cancel')">✖</button>
    </div>

    <form [formGroup]="form" class="modal-form" (ngSubmit)="submit()">
      <div class="summary-grid">
        <label class="field">
          <span>{{ i18n.translate('transactions.columnType') }}</span>
          <div class="readonly-field">{{ getTypeLabel() }}</div>
        </label>

        <label class="field">
          <span>{{ isTransfer() ? i18n.translate('accounts.transferFrom') : i18n.translate('transactions.columnAccount') }}</span>
          <div class="readonly-field">{{ getAccountLabel() }}</div>
        </label>

        <label class="field">
          <span>{{ i18n.translate('transactions.columnAmount') }}</span>
          <div class="readonly-field">{{ formatCurrentAmount() }}</div>
        </label>
      </div>

      <ng-container *ngIf="isTransfer(); else regularTransactionFields">
        <div class="transfer-edit-grid">
          <label class="field">
            <span>{{ i18n.translate('accounts.transferFrom') }}</span>
            <select formControlName="fromAccountId">
              <option value="">{{ i18n.translate('transactions.selectAccount') }}</option>
              <option *ngFor="let account of transferSourceOptions(); trackBy: trackByAccountId" [value]="'' + account.id">
                {{ account.name }}
              </option>
            </select>
          </label>

          <label class="field">
            <span>{{ i18n.translate('accounts.transferTo') }}</span>
            <select formControlName="toAccountId">
              <option value="">{{ i18n.translate('transactions.selectAccount') }}</option>
              <optgroup *ngIf="transferOwnDestinationOptions().length > 0" [label]="i18n.translate('accounts.transferOwnAccounts')">
                <option *ngFor="let option of transferOwnDestinationOptions(); trackBy: trackByTransferOption" [value]="option.value">
                  {{ option.label }}
                </option>
              </optgroup>
              <optgroup *ngIf="transferOtherDestinationOptions().length > 0" [label]="i18n.translate('accounts.transferOtherUsers')">
                <option *ngFor="let option of transferOtherDestinationOptions(); trackBy: trackByTransferOption" [value]="option.value">
                  {{ option.label }}
                </option>
              </optgroup>
            </select>
          </label>
        </div>

        <p class="state-message" *ngIf="isLoadingAccounts()">{{ i18n.translate('transactions.loadingAccounts') }}</p>
      </ng-container>

      <ng-template #regularTransactionFields>
        <p class="field-hint">{{ getAccountLabel() }}</p>
      </ng-template>

      <label class="field">
        <span>{{ i18n.translate('transactions.columnDate') }}</span>
        <input type="date" formControlName="transactionDate" />
      </label>

      <label class="field">
        <span>{{ i18n.translate('transactions.columnAmount') }}</span>
        <input type="number" min="0.01" step="0.01" formControlName="amount" />
      </label>

      <label class="field">
        <span>{{ i18n.translate('transactions.columnComment') }}</span>
        <textarea rows="3" formControlName="comment"></textarea>
      </label>

      <p class="error-message" *ngIf="errorMessage()">{{ errorMessage() }}</p>

      <div class="modal-actions">
        <button type="button" class="secondary" (click)="close()">{{ i18n.translate('login.cancel') }}</button>
        <button type="submit" class="primary" [disabled]="isSubmitting() || (isTransfer() && isLoadingAccounts())">
          {{ isSubmitting() ? i18n.translate('transactions.editing') : i18n.translate('transactions.saveChanges') }}
        </button>
      </div>
    </form>
  </section>
</div>
