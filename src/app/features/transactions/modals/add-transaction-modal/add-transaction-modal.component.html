<div class="modal-overlay">
  <div class="modal-backdrop" (click)="close()"></div>

  <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="transaction-modal-title" [style.transform]="getModalTransform()" (keydown.escape)="close()">
    <div class="modal-header" (pointerdown)="startDrag($event)">
      <h2 id="transaction-modal-title">{{ getModalTitle() }}</h2>
      <button type="button" class="close-button" (pointerdown)="$event.stopPropagation()" (click)="close()" [attr.aria-label]="i18n.translate('login.cancel')">✖</button>
    </div>

    <ng-container>
      <nav class="transaction-tabs" role="tablist" [attr.aria-label]="i18n.translate('transactions.transactionType')">
        <button
          type="button"
          class="tab-button"
          role="tab"
          [class.active]="transactionType() === 'EXPENSE'"
          [attr.aria-selected]="transactionType() === 'EXPENSE'"
          (click)="onTransactionTypeChange('EXPENSE')">
          <span class="tab-label">{{ i18n.translate('transactions.typeExpense') }}</span>
        </button>

        <button
          type="button"
          class="tab-button"
          role="tab"
          [class.active]="transactionType() === 'INCOME'"
          [attr.aria-selected]="transactionType() === 'INCOME'"
          (click)="onTransactionTypeChange('INCOME')">
          <span class="tab-label">{{ i18n.translate('transactions.typeIncome') }}</span>
        </button>

        <button
          type="button"
          class="tab-button"
          role="tab"
          [class.active]="transactionType() === 'TRANSFER'"
          [attr.aria-selected]="transactionType() === 'TRANSFER'"
          (click)="onTransactionTypeChange('TRANSFER')">
          <span class="tab-label">{{ i18n.translate('transactions.typeTransfer') }}</span>
        </button>
      </nav>

      <form [formGroup]="transactionForm" class="modal-shell" (ngSubmit)="submitTransaction()" (keydown.enter)="$event.preventDefault(); submitTransaction()">
        <!-- Need peidetud väljad tagavad, et väärtused ei ole kunagi null -->
        <input type="hidden" formControlName="reminderId" />
        <input type="hidden" formControlName="useMicroSavings" />
        <input type="hidden" formControlName="multiplier" />

        <div class="modal-scroll">
          <section class="tab-panel" *ngIf="transactionType() === 'EXPENSE'">
            <p class="helper-copy">
              {{ i18n.translate('transactions.typeExpense') }}
            </p>

            <div class="form-grid">
              <label class="field field-wide">
                <span>{{ getAccountFieldLabel() }}</span>
                <select class="form-input-rounded" formControlName="accountId">
                  <option value="">{{ i18n.translate('transactions.selectAccount') }}</option>
                  <option *ngFor="let account of expenseAccounts(); trackBy: trackByAccountId" [value]="'' + account.id">
                    {{ getAccountLabel(account) }}
                  </option>
                </select>
              </label>

              <label class="field">
                <span>{{ i18n.translate('transactions.columnDate') }}</span>
                <input class="form-input-rounded" type="date" formControlName="transactionDate" />
              </label>

              <label class="field">
                <span>{{ i18n.translate('transactions.columnAmount') }}</span>
                <div class="amount-input-row">
                  <input class="form-input-rounded amount-input" type="text" min="0.01" step="0.01" inputmode="decimal" formControlName="amount" (input)="normalizeMoneyInput($event)" />
                  <button
                    type="button"
                    class="calculator-button"
                    (click)="openCalculator()"
                    [attr.aria-label]="i18n.translate('header.calculator')"
                    [attr.title]="i18n.translate('header.calculator')">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <rect x="4" y="3" width="16" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
                      <line x1="8" y1="7" x2="8" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="12" y1="7" x2="12" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="16" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="8" y1="11" x2="8" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="12" y1="11" x2="12" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="16" y1="11" x2="16" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="8" y1="15" x2="8" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="12" y1="15" x2="12" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="16" y1="15" x2="16" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                  </button>
                </div>
                <p class="error-message" *ngIf="transactionType() === 'EXPENSE' && !isExpenseAmountWithinBalance() && transactionForm.controls.amount.value">
                  {{ i18n.translate('transactions.balanceWouldGoNegative') }}
                </p>
              </label>

              <div class="field field-wide" *ngIf="savingsAccountAvailable()">
                <label class="toggle-card">
                  <div class="toggle-header">
                    <input
                      type="checkbox"
                      [checked]="useMicroSavings()"
                      (change)="onMicroSavingsToggle($any($event.target).checked)" />
                    <span class="toggle-copy">
                      <strong>{{ i18n.translate('transactions.microSavingsEnable') }}</strong>
                      <small>{{ i18n.translate('transactions.microSavingsHint') }}</small>
                    </span>
                    <div class="multiplier-options" *ngIf="useMicroSavings()">
                      <label class="pill-option">
                        <input
                          type="radio"
                          name="microSavingsMultiplier"
                          [checked]="microSavingsMultiplier() === 1"
                          value="1"
                          (change)="onMicroSavingsMultiplierChange('1')" />
                        <span>1x</span>
                      </label>
                      <label class="pill-option">
                        <input
                          type="radio"
                          name="microSavingsMultiplier"
                          [checked]="microSavingsMultiplier() === 2"
                          value="2"
                          (change)="onMicroSavingsMultiplierChange('2')" />
                        <span>2x</span>
                      </label>
                    </div>
                  </div>
                </label>
              </div>

              <label class="field">
                <span>{{ i18n.translate('transactions.mainCategory') }}</span>
                <select class="form-input-rounded" formControlName="mainCategoryId">
                  <option value="" disabled>{{ mainCategoryPlaceholder() }}</option>
                  <option [value]="addCategoryValue">{{ categoryAddLabel() }}</option>
                  <option *ngFor="let category of mainCategoryOptions(); trackBy: trackByCategoryId" [value]="'' + category.id">
                    {{ category.name }}
                  </option>
                </select>
              </label>

              <label class="field">
                <span>{{ i18n.translate('transactions.subCategory') }}</span>
                <select class="form-input-rounded" formControlName="categoryId" [disabled]="!selectedMainCategory()">
                  <option value="" disabled>{{ subCategoryPlaceholder() }}</option>
                  <option [value]="addCategoryValue">{{ categoryAddLabel() }}</option>
                  <option *ngFor="let category of subCategoryOptions(); trackBy: trackByCategoryId" [value]="'' + category.id">
                    {{ category.label }}
                  </option>
                </select>
              </label>

              <label class="field field-wide">
                <span>{{ i18n.translate('transactions.columnComment') }}</span>
                <textarea rows="3" formControlName="comment"></textarea>
              </label>
            </div>
          </section>

          <section class="tab-panel" *ngIf="transactionType() === 'INCOME'">
            <p class="helper-copy">
              {{ i18n.translate('transactions.typeIncome') }}
            </p>

            <div class="form-grid">
              <label class="field field-wide">
                <span>{{ getAccountFieldLabel() }}</span>
                <select class="form-input-rounded" formControlName="accountId">
                  <option value="">{{ i18n.translate('transactions.selectAccount') }}</option>
                  <option *ngFor="let account of expenseAccounts(); trackBy: trackByAccountId" [value]="'' + account.id">
                    {{ getAccountLabel(account) }}
                  </option>
                </select>
              </label>

              <label class="field">
                <span>{{ i18n.translate('transactions.columnDate') }}</span>
                <input class="form-input-rounded" type="date" formControlName="transactionDate" />
              </label>

              <label class="field">
                <span>{{ i18n.translate('transactions.columnAmount') }}</span>
                <div class="amount-input-row">
                  <input class="form-input-rounded amount-input" type="text" min="0.01" step="0.01" inputmode="decimal" formControlName="amount" (input)="normalizeMoneyInput($event)" />
                  <button
                    type="button"
                    class="calculator-button"
                    (click)="openCalculator()"
                    [attr.aria-label]="i18n.translate('header.calculator')"
                    [attr.title]="i18n.translate('header.calculator')">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <rect x="4" y="3" width="16" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
                      <line x1="8" y1="7" x2="8" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="12" y1="7" x2="12" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="16" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="8" y1="11" x2="8" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="12" y1="11" x2="12" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="16" y1="11" x2="16" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="8" y1="15" x2="8" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="12" y1="15" x2="12" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="16" y1="15" x2="16" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                  </button>
                </div>
              </label>

              <label class="field">
                <span>{{ i18n.translate('transactions.mainCategory') }}</span>
                <select class="form-input-rounded" formControlName="mainCategoryId">
                  <option value="" disabled>{{ mainCategoryPlaceholder() }}</option>
                  <option [value]="addCategoryValue">{{ categoryAddLabel() }}</option>
                  <option *ngFor="let category of mainCategoryOptions(); trackBy: trackByCategoryId" [value]="'' + category.id">
                    {{ category.name }}
                  </option>
                </select>
              </label>

              <label class="field">
                <span>{{ i18n.translate('transactions.subCategory') }}</span>
                <select class="form-input-rounded" formControlName="categoryId" [disabled]="!selectedMainCategory()">
                  <option value="" disabled>{{ subCategoryPlaceholder() }}</option>
                  <option [value]="addCategoryValue">{{ categoryAddLabel() }}</option>
                  <option *ngFor="let category of subCategoryOptions(); trackBy: trackByCategoryId" [value]="'' + category.id">
                    {{ category.label }}
                  </option>
                </select>
              </label>

              <label class="field field-wide">
                <span>{{ i18n.translate('transactions.columnComment') }}</span>
                <textarea rows="3" formControlName="comment"></textarea>
              </label>
            </div>
          </section>

          <section class="tab-panel transfer-panel" *ngIf="transactionType() === 'TRANSFER'">
            <p class="helper-copy">
              {{ i18n.translate('accounts.transferAccountHint') }}
            </p>

            <div class="form-grid transfer-select-grid">
              <label class="field">
                <span>{{ i18n.translate('accounts.transferFrom') }}</span>
                <select
                  class="form-input-rounded transfer-select"
                  formControlName="transferFromAccountId">
                  <option value="">{{ i18n.translate('transactions.selectAccount') }}</option>
                  <option *ngFor="let account of ownAccounts(); trackBy: trackByAccountId" [value]="'' + account.id">
                    {{ getTransferSourceOptionLabel(account) }}
                  </option>
                </select>
              </label>

              <label class="field">
                <span>{{ i18n.translate('accounts.shareSelectUser') }}</span>
                <select
                  class="form-input-rounded transfer-select"
                  [class.placeholder-active]="!transactionForm.controls.transferToAccountId.value"
                  formControlName="transferToAccountId"
                  [disabled]="!hasTransferDestinationTargets()">
                  <option value="">{{ getTransferTargetPlaceholder() }}</option>
                  <optgroup
                    *ngIf="transferTargetUsers().some((user) => user.isCurrentUser && shouldShowMyAccountsSection(user))"
                    [label]="i18n.translate('accounts.myAccounts')">
                    <ng-container *ngFor="let user of transferTargetUsers(); trackBy: trackByTransferUser">
                      <ng-container *ngIf="user.isCurrentUser">
                        <ng-container *ngFor="let account of user.accounts; trackBy: trackByAccountId">
                          <option *ngIf="selectedTransferSourceAccount()?.id !== account.id" [value]="'' + account.id">
                            {{ getTransferTargetAccountLabel(account) }}
                          </option>
                        </ng-container>
                      </ng-container>
                    </ng-container>
                  </optgroup>

                  <optgroup
                    *ngIf="transferTargetUsers().some((user) => !user.isCurrentUser)"
                    [label]="i18n.translate('accounts.otherUsers')">
                    <ng-container *ngFor="let user of transferTargetUsers(); trackBy: trackByTransferUser">
                      <ng-container *ngIf="!user.isCurrentUser">
                        <option [value]="'' + (0 - user.id)">
                          {{ user.username }}
                        </option>
                      </ng-container>
                    </ng-container>
                  </optgroup>
                </select>
                <p class="empty-message" *ngIf="!hasTransferDestinationTargets()">
                  {{ i18n.translate('accounts.noTransferTargets') }}
                </p>
              </label>
            </div>

            <div class="form-grid transfer-details-grid">
              <label class="field">
                <span>{{ i18n.translate('accounts.transferAmount') }}</span>
                <div class="amount-input-row">
                  <input class="form-input-rounded amount-input" type="text" min="0.01" step="0.01" inputmode="decimal" formControlName="amount" (input)="normalizeMoneyInput($event)" />
                  <button
                    type="button"
                    class="calculator-button"
                    (click)="openCalculator()"
                    [attr.aria-label]="i18n.translate('header.calculator')"
                    [attr.title]="i18n.translate('header.calculator')">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <rect x="4" y="3" width="16" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
                      <line x1="8" y1="7" x2="8" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="12" y1="7" x2="12" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="16" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="8" y1="11" x2="8" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="12" y1="11" x2="12" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="16" y1="11" x2="16" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="8" y1="15" x2="8" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="12" y1="15" x2="12" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                      <line x1="16" y1="15" x2="16" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                  </button>
                </div>
                <p class="error-message" *ngIf="!isTransferAmountWithinBalance() && transactionForm.controls.amount.value">
                  {{ i18n.translate('transactions.balanceWouldGoNegative') }}
                </p>
              </label>

              <label class="field">
                <span>{{ i18n.translate('transactions.columnDate') }}</span>
                <input class="form-input-rounded" type="date" formControlName="transactionDate" />
              </label>

              <label class="field field-wide">
                <span>{{ i18n.translate('accounts.transferComment') }}</span>
                <textarea rows="3" formControlName="comment"></textarea>
              </label>
            </div>

          </section>

          <p class="state-message" *ngIf="isLoadingAccounts() || isLoadingTransferTargets()">{{ i18n.translate('transactions.loadingAccounts') }}</p>
          <p class="success-message" *ngIf="successMessage()">{{ successMessage() }}</p>
          <p class="error-message" *ngIf="errorMessage()">{{ errorMessage() }}</p>
        </div>

        <footer class="modal-footer">
          <button
            type="submit"
            class="primary"
            [disabled]="isSubmitting() || isLoadingAccounts() || isLoadingTransferTargets() || (transactionType() === 'EXPENSE' && !isExpenseAmountWithinBalance()) || (transactionType() === 'TRANSFER' && !isTransferAmountWithinBalance()) || (transactionType() === 'TRANSFER' && !hasTransferDestinationTargets())">
            {{ isSubmitting() ? getSubmittingLabel() : getSubmitButtonLabel() }}
          </button>
        </footer>
      </form>
    </ng-container>
  </section>
</div>

<app-calculator
  [isVisible]="isCalculatorVisible()"
  (closeCalculator)="closeCalculator()">
</app-calculator>

<app-category-editor-modal
  [isOpen]="isCategoryEditorOpen()"
  [mode]="categoryEditorMode()"
  [parentCategory]="categoryEditorParentCategory()"
  [defaultType]="categoryEditorDefaultType()"
  [defaultGroup]="categoryEditorDefaultGroup()"
  [allowGroupSelection]="true"
  (closed)="onCategoryEditorClosed()"
  (saved)="onCategoryEditorSaved($event)" />
