<div class="modal-overlay" *ngIf="isOpen()">
  <div class="modal-backdrop" (click)="close()"></div>

  <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="recurring-payment-title" [style.transform]="getModalTransform()" (keydown.escape)="close()">
    <div class="modal-header" (pointerdown)="startDrag($event)">
      <h2 id="recurring-payment-title">
        {{ isEditMode() ? i18n.translate('recurringPayments.editTitle') : i18n.translate('recurringPayments.createTitle') }}
      </h2>
      <button type="button" class="close-button" (pointerdown)="$event.stopPropagation()" (click)="close()" [attr.aria-label]="i18n.translate('login.cancel')">✖</button>
    </div>

    <form [formGroup]="form" class="modal-form" (ngSubmit)="submit()">
      <label class="field">
        <span>{{ i18n.translate('recurringPayments.formName') }}</span>
        <input type="text" formControlName="name" />
      </label>

      <div class="category-grid">
        <label class="field">
          <span>{{ i18n.translate('transactions.mainCategory') }}</span>
          <select class="form-input-rounded" formControlName="mainCategoryId" (change)="onMainCategoryChange($any($event.target).value)">
            <option value="0" disabled hidden>{{ i18n.translate('transactions.selectCategory') }}</option>
            <option *ngFor="let option of mainCategoryOptions(); trackBy: trackByCategoryId" [value]="'' + option.id">
              {{ option.name }}
            </option>
          </select>
        </label>

        <label class="field">
          <span>{{ i18n.translate('transactions.subCategory') }}</span>
          <select class="form-input-rounded" formControlName="categoryId" [disabled]="!selectedMainCategory()" (change)="onSubCategoryChange($any($event.target).value)">
            <option value="0" disabled hidden>{{ i18n.translate('transactions.selectSubCategory') }}</option>
            <option *ngFor="let option of subCategoryOptions(); trackBy: trackByCategoryId" [value]="'' + option.id">
              {{ option.label }}
            </option>
          </select>
        </label>
      </div>

      <label class="field">
        <span>{{ i18n.translate('recurringPayments.columnAmount') }}</span>
        <div class="amount-input-row">
          <input type="text" class="form-input-rounded amount-input" min="0.01" step="0.01" inputmode="decimal" formControlName="amount" (input)="normalizeMoneyInput($event)" />
          <button
            type="button"
            class="calculator-button"
            (click)="openCalculator()"
            [attr.aria-label]="i18n.translate('header.calculator')"
            [attr.title]="i18n.translate('header.calculator')">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4" y="3" width="16" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
              <line x1="8" y1="7" x2="8" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <line x1="12" y1="7" x2="12" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <line x1="16" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <line x1="8" y1="11" x2="8" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <line x1="12" y1="11" x2="12" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <line x1="16" y1="11" x2="16" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <line x1="8" y1="15" x2="8" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <line x1="12" y1="15" x2="12" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <line x1="16" y1="15" x2="16" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
        </div>
      </label>

      <label class="field">
        <span>{{ i18n.translate('categories.dueDay') }}</span>
        <input type="number" min="1" max="31" inputmode="numeric" formControlName="dueDay" />
      </label>

      <label class="field checkbox-field">
        <span>{{ i18n.translate('recurringPayments.formActive') }}</span>
        <input type="checkbox" formControlName="active" />
      </label>

      <p class="helper-copy">{{ i18n.translate('recurringPayments.formHint') }}</p>
      <p class="state-message" *ngIf="categoryOptions().length === 0">{{ i18n.translate('recurringPayments.noEligibleCategories') }}</p>
      <p class="error-message" *ngIf="errorMessage()">{{ errorMessage() }}</p>

      <div class="modal-actions">
        <button type="button" class="secondary" (click)="close()">{{ i18n.translate('login.cancel') }}</button>
        <button type="submit" class="primary" [disabled]="isSubmitting() || categoryOptions().length === 0">
          {{ isSubmitting()
            ? (isEditMode() ? i18n.translate('recurringPayments.saving') : i18n.translate('recurringPayments.creating'))
            : (isEditMode() ? i18n.translate('recurringPayments.save') : i18n.translate('recurringPayments.create')) }}
        </button>
      </div>
    </form>
  </section>

  <app-calculator
    [isVisible]="isCalculatorVisible()"
    (closeCalculator)="closeCalculator()">
  </app-calculator>
</div>
